<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador con limite</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

    <header></header>

    <main>
        <div id="root"></div>
    </main>
    
    <footer></footer>

    <script type="text/babel">
        const {useState} = React;

        const App = () => {
            const [contador, setContador] = useState(0);
            
            function aviso() {
                alert(`No se puede procesar, utilice valores entre 0 y 10. \nGracias por su comprensión.`);
            };

            function suma () { 
                if(contador<10) {
                    setContador((valor) => valor +1)
                } else {
                    aviso();
                }
            };
            
            function resta () { 
                if(contador>0) {
                    setContador((valor) => valor -1)
                } else {
                    aviso();
                }
            };

            return (
                <div>
                    <h1>Reto</h1>
                    <ul>
                        <li>Crea un contador que inicie en 0</li>
                        <li>Crea un boton para disminuir en 1, pero no permitas que el valor del contador sea menor a 0</li>
                        <li>Crea un boton para aumentar hasta 10</li>
                        <li>Crea un mensaje al llegar al limite</li>

                    </ul>
                    <h2>Contador con limite: {contador}</h2>
                    <button onClick={resta}>-</button>
                    <button onClick={suma}>+</button>
                </div>
            )
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
