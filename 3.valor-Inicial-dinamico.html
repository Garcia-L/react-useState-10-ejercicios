<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valor inicial dinámico</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>
    <header></header>
    <main>
        <div id="root"></div>
    </main>
    <footer></footer>

    <script type="text/babel">
        const App = () => {

            const [contador, setContador] = React.useState(0);

            const controlarSumit = (e) => {
                e.preventDefault();
                const nuevoValor = e.target.valorInicial.value;
                setContador(nuevoValor);
            };


            return (
                <div>
                    <p>Crea un input donde el usuario define el valor inicial del contador</p>
                    <h1>Contador: {contador}</h1>

                    <form onSubmit={controlarSumit}>
                        <label htmlFor="valorInicial">Valor Inicial</label>
                        <input type="number" id="valorInicial" placeholder="Por ejemplo: 10"/>
                        <button type="submit">Procesar</button>
                    </form>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)
    </script>
</body>

</html>
