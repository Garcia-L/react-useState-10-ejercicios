<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini carrito</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>

<body>
    <header></header>
    <main>
        <div id="root"></div>
    </main>
    <footer></footer>

    <script type="text/babel">
        const {useState} = React;

        const App = () => {
            const [carrito, setCarrito] = useState([]);
            const [textInput, setTextInput] = useState("");

            function agregar() {

                if (textInput.trim() === "") return;

                setCarrito([...carrito, textInput]);
            };

            function eliminar(elemento, index) {

                const productos = [...carrito];
                const filtro = productos.filter( (elemento, posicion)=> posicion !== index);
                setCarrito(filtro);
            };

            return (
                <div>
                    <h1>Reto</h1>

                    <ul>
                        <li>Crea un input para capturar nombre de frutas</li>
                        <li>Crea un boton para guardar el nombre de la fruta, actualizando el useState</li>
                        <li>Muestre la lista en pantalla</li>
                        <li>Agrega un boton para eliminar cada elemento de la lista</li>
                    </ul>

                    <h2>Mini carrito</h2>

                    <p>Agregar productos</p>

                    <ul>
                        <li>Mostrar total</li>
                        <li>Eliminar productos</li>
                    </ul>


                    <input type="text" onChange={(e) => setTextInput(e.target.value)} />
                    <button onClick={agregar}>Agregar</button>

                    <div>
                        <ul>
                            {
                                carrito.map(
                                    (elemento, index) =>
                                    (<li key={index}>
                                        {index} - {elemento}
                                        <button onClick={() => eliminar(elemento, index)}>Eliminar</button>
                                    </li>)
                                )
                            }
                        </ul>
                    </div>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);

    </script>
</body>

</html>
