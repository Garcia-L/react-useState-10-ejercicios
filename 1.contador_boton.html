<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador en botón</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

</head>
<body>
    
    <header></header>

    <main>
        <div id="root"></div>
    </main>

    <footer></footer>

    <script type="text/babel">
        const {useState} = React;
        
        const App = () => {

            const [contador, setContador] = useState(0);
            function sumar() { setContador(a => a +1) }
            function restar() { setContador(a => a -1) }

            return (
                <div>
                    <h1>Reto:</h1>
                    <ul>
                        <li>Crea un estado cuyo valor inicial es 0</li>
                        <li>Crea un boton para disminuir el estado en 1</li>
                        <li>Y otro para aumentar el estado en 1</li>
                    </ul>
                    <h2>Contador: {contador}</h2>
                    <button onClick={restar}>-</button> 
                    <button onClick={sumar}>+</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App/>);
    </script>
</body>
</html>
