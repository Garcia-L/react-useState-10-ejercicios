<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista dinámica</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <header></header>
    <main>
        <div id="root"></div>
    </main>
    <footer></footer>

    <script type="text/babel">
        const App = () => {
            const [lista, setLista] = React.useState([]);

            function guardar(e) {
                e.preventDefault();
                const fruta = e.target.fruta.value;
                setLista([...lista, fruta]);
                e.target.reset();
            }

            return (
                <div>
                    <h1>Lista en pantalla, usando Arrays en el estado</h1>
                    <form onSubmit={guardar}>
                        <input type="text" name="fruta" id="fruta" placeholder="Agrega un nombre de fruta" />
                        <button type="submit">Guardar</button>
                    </form>

                    <ul>
                        {
                            lista.map( (e) => (
                                <li>{e}</li>
                            ))
                        }
                    </ul>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />)
    </script>
</body>

</html>
