<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador con botón de reset</title>

    <!-- CDN de libreria de react  -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <!-- CDN de libreria de react dom -->
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- CDN de libreria de babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>

    <header></header>
    <main>
        <div id="root"></div>
    </main>
    <footer></footer>
    <script type="text/babel">
        const App = () => {

            const [contador, setContador] = React.useState(0);

            function sumar() { setContador(valor => ++valor) }
            function restar() { setContador(valor => --valor) }
            function resetear() { setContador(valor => valor = 0) }

            return (
                <div>
                    <p>Crea un botón para volver a 0, otros dos para aumentar en 1 y disminuir en 1</p>
                    <h1>Contador: {contador}</h1>

                    <button onClick={restar}>-</button>
                    <button onClick={resetear}>resetear</button>
                    <button onClick={sumar}>+</button>
                </div>
            )
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
